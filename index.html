<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISS Live Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #container { width: 100%; height: 100%; }

    /* Info panel — top-left glassmorphic overlay */
    #info-panel {
      position: fixed; top: 15px; left: 15px; z-index: 10;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
      border: 1px solid rgba(100,150,255,0.2); border-radius: 8px;
      padding: 14px 18px; font-family: monospace; font-size: 12px;
      color: rgba(255,255,255,0.8); min-width: 220px;
      display: none; /* shown once first data arrives */
    }
    #info-panel .title { font-size: 14px; font-weight: bold; color: #4a9eff; margin-bottom: 10px; }
    #info-panel .row { margin-bottom: 6px; }
    #info-panel .label { color: rgba(255,255,255,0.5); }
    #info-panel .value { color: #fff; }
    #info-panel .divider { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(100,150,255,0.15); }
    #info-panel .updated { margin-top: 8px; font-size: 10px; color: rgba(255,255,255,0.3); }
    #info-panel .crew-list { margin-top: 4px; font-size: 11px; color: rgba(255,255,255,0.6); line-height: 1.6; }
    #info-panel .jump-btns { display: flex; gap: 6px; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(100,150,255,0.15); }
    #info-panel .jump-btn {
      flex: 1; padding: 5px 0; border: 1px solid; border-radius: 4px;
      font-family: monospace; font-size: 11px; font-weight: bold;
      cursor: pointer; background: transparent; transition: background 0.2s;
    }
    #info-panel .jump-btn.iss { color: #ff4444; border-color: rgba(255,68,68,0.4); }
    #info-panel .jump-btn.iss:hover { background: rgba(255,68,68,0.15); }
    #info-panel .jump-btn.anti { color: #00ddff; border-color: rgba(0,221,255,0.4); }
    #info-panel .jump-btn.anti:hover { background: rgba(0,221,255,0.15); }

    /* Title — top-right */
    #title-bar {
      position: fixed; top: 15px; right: 15px; z-index: 10;
      text-align: right;
    }
    #title-bar .name { font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.9); letter-spacing: 2px; }
    #title-bar .live { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    #title-bar .live::before {
      content: ''; display: inline-block; width: 6px; height: 6px;
      background: #ff4444; border-radius: 50%; margin-right: 6px;
      box-shadow: 0 0 6px #ff4444;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Controls hint — bottom center */
    #controls-hint {
      position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 10;
      font-size: 11px; color: rgba(255,255,255,0.3);
    }

    /* Connection lost banner */
    #connection-lost {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 20;
      background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.3); border-radius: 8px;
      padding: 12px 24px; color: #ff6666; font-family: monospace; font-size: 13px;
    }

    /* WebGL fallback */
    #no-webgl {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: #000; color: #fff; font-size: 18px;
      justify-content: center; align-items: center;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <div id="info-panel">
    <div class="title">ISS LIVE STATUS</div>
    <div class="row"><span class="label">LAT</span>&ensp;<span class="value" id="lat-val">—</span></div>
    <div class="row"><span class="label">LON</span>&ensp;<span class="value" id="lon-val">—</span></div>
    <div class="row" style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(0,221,255,0.15);"><span class="label" style="color:rgba(0,221,255,0.5);">A-LAT</span>&ensp;<span class="value" id="anti-lat-val" style="color:#00ddff;">—</span></div>
    <div class="row"><span class="label" style="color:rgba(0,221,255,0.5);">A-LON</span>&ensp;<span class="value" id="anti-lon-val" style="color:#00ddff;">—</span></div>
    <div class="row"><span class="label" style="color:rgba(0,221,255,0.5);">A-ELEV</span>&ensp;<span class="value" id="anti-elev-val" style="color:#00ddff;">—</span></div>
    <div class="row"><span class="label" style="color:rgba(0,221,255,0.5);">A-DIST</span>&ensp;<span class="value" id="anti-dist-val" style="color:#00ddff;">—</span></div>
    <div class="row"><span class="label">ALT</span>&ensp;<span class="value">~408 km</span></div>
    <div class="row"><span class="label">SPD</span>&ensp;<span class="value">~27,600 km/h</span></div>
    <div class="divider">
      <div class="row"><span class="label">CREW</span>&ensp;<span class="value" id="crew-count">—</span></div>
      <div class="crew-list" id="crew-list"></div>
    </div>
    <div class="jump-btns">
      <button class="jump-btn iss" id="jump-iss">JUMP TO ISS</button>
      <button class="jump-btn anti" id="jump-anti">JUMP TO ANTI</button>
    </div>
    <div class="updated" id="updated-time">Updated: —</div>
  </div>

  <div id="title-bar">
    <div class="name">ISS TRACKER</div>
    <div class="live">LIVE</div>
  </div>

  <div id="controls-hint">Drag to rotate &bull; Scroll to zoom</div>
  <div id="connection-lost">Connection lost — retrying…</div>
  <div id="no-webgl">Your browser does not support WebGL.</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── WebGL check ──────────────────────────────────────────
    if (!document.createElement('canvas').getContext('webgl2') &&
        !document.createElement('canvas').getContext('webgl')) {
      document.getElementById('no-webgl').style.display = 'flex';
      throw new Error('WebGL not supported');
    }

    // ── Constants ────────────────────────────────────────────
    const EARTH_RADIUS = 5;
    const ISS_ALTITUDE = 0.15;          // visual height above globe
    const POLL_INTERVAL = 5000;         // 5 seconds
    const AUTO_ROTATE_DELAY = 5000;     // 5 seconds idle → auto-rotate
    const ORBIT_PERIOD = 92.68 * 60;    // seconds (one ISS orbit)
    const ORBIT_INCLINATION = 51.6;     // degrees

    // ── Renderer ─────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('container').appendChild(renderer.domElement);

    // ── Scene & Camera ───────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 14);

    // ── Controls ─────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 7;
    controls.maxDistance = 30;
    controls.enablePan = false;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;

    // Pause auto-rotate on interaction, resume after idle
    let idleTimer;
    function resetIdleTimer() {
      controls.autoRotate = false;
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => { controls.autoRotate = true; }, AUTO_ROTATE_DELAY);
    }
    renderer.domElement.addEventListener('pointerdown', resetIdleTimer);
    renderer.domElement.addEventListener('pointermove', (e) => {
      if (e.buttons > 0) resetIdleTimer();
    });
    renderer.domElement.addEventListener('wheel', resetIdleTimer);

    // ── Jump-to-target camera animation (spherical arc) ────
    let jumpAnim = null; // { startQ, endQ, dist, startTime, duration }
    const _jumpQ = new THREE.Quaternion();
    function jumpTo(targetPos) {
      const dist = camera.position.length();
      const startDir = camera.position.clone().normalize();
      const endDir = targetPos.clone().normalize();
      // Quaternion that rotates startDir to endDir
      const startQ = new THREE.Quaternion();
      const endQ = new THREE.Quaternion().setFromUnitVectors(startDir, endDir);
      // Scale duration by angle (min 400ms, max 1600ms)
      const angle = startDir.angleTo(endDir);
      const duration = 400 + (angle / Math.PI) * 1200;
      jumpAnim = { startDir, startQ, endQ, dist, startTime: performance.now(), duration };
      controls.autoRotate = false;
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => { controls.autoRotate = true; }, AUTO_ROTATE_DELAY);
    }
    document.getElementById('jump-iss').addEventListener('click', () => {
      if (hasPosition) jumpTo(currentPos);
    });
    document.getElementById('jump-anti').addEventListener('click', () => {
      if (antiCurrentPos.lengthSq()) jumpTo(antiCurrentPos);
    });

    // ── Starfield ────────────────────────────────────────────
    {
      const count = 4000;
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = 80 + Math.random() * 120;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
      }
      const starGeo = new THREE.BufferGeometry();
      starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true });
      scene.add(new THREE.Points(starGeo, starMat));
    }

    // ── Lighting ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
    scene.add(sunLight);

    // ── Earth globe ──────────────────────────────────────────
    const textureLoader = new THREE.TextureLoader();
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // Earth sphere
    const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
    const earthMat = new THREE.MeshStandardMaterial({
      map: textureLoader.load(
        'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg',
        undefined,
        undefined,
        () => {
          // Fallback: solid blue sphere if texture fails
          earthMat.map = null;
          earthMat.color.set(0x2266aa);
          earthMat.needsUpdate = true;
        }
      ),
      roughness: 1,
      metalness: 0,
    });
    const earthMesh = new THREE.Mesh(earthGeo, earthMat);
    earthGroup.add(earthMesh);

    // Atmosphere glow (Fresnel-based)
    const atmosphereGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.02, 64, 64);
    const atmosphereMat = new THREE.ShaderMaterial({
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
          vec3 viewDir = normalize(-vPosition);
          float fresnel = 1.0 - dot(viewDir, vNormal);
          fresnel = pow(fresnel, 3.0);
          gl_FragColor = vec4(0.4, 0.7, 1.0, fresnel * 0.6);
        }
      `,
      transparent: true,
      side: THREE.FrontSide,
      depthWrite: false,
    });
    earthGroup.add(new THREE.Mesh(atmosphereGeo, atmosphereMat));

    // ── Day/Night shading ────────────────────────────────────
    // Compute accurate sun direction using the same astronomical algorithms as suncalc:
    // Julian date → solar mean anomaly → ecliptic longitude → equatorial coords → subsolar point
    const _sunDir = new THREE.Vector3();
    function getSunDirection() {
      const now = new Date();
      const rad = Math.PI / 180;
      // Days since J2000.0 epoch
      const d = (now.valueOf() / 86400000 - 0.5 + 2440588) - 2451545;

      // Sun ecliptic coordinates
      const M = rad * (357.5291 + 0.98560028 * d); // mean anomaly
      const C = rad * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M)); // equation of center
      const L = M + C + rad * 102.9372 + Math.PI; // ecliptic longitude
      const obl = rad * 23.4397; // obliquity of the ecliptic

      // Equatorial coordinates
      const dec = Math.asin(Math.sin(obl) * Math.sin(L)); // declination
      const ra = Math.atan2(Math.sin(L) * Math.cos(obl), Math.cos(L)); // right ascension

      // Subsolar point: where the sun is directly overhead
      const gst = rad * (280.16 + 360.9856235 * d); // Greenwich sidereal time
      let subLon = ra - gst; // subsolar longitude in radians
      subLon = ((subLon % (2 * Math.PI)) + 3 * Math.PI) % (2 * Math.PI) - Math.PI; // normalize to [-π, π]

      // Convert to 3D vector (same coordinate system as latLonToVec3)
      const phi = Math.PI / 2 - dec; // colatitude
      const theta = subLon + Math.PI; // matches (lon+180) offset in latLonToVec3
      return _sunDir.set(
        -Math.sin(phi) * Math.cos(theta),
         Math.cos(phi),
         Math.sin(phi) * Math.sin(theta)
      ).normalize();
    }

    // Night-side overlay sphere (slightly larger to prevent z-fighting)
    const nightGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.001, 64, 64);
    const nightMat = new THREE.ShaderMaterial({
      uniforms: {
        sunDir: { value: getSunDirection() },
      },
      vertexShader: `
        varying vec3 vWorldNormal;
        void main() {
          vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 sunDir;
        varying vec3 vWorldNormal;
        void main() {
          float dotSun = dot(vWorldNormal, sunDir);
          // Smooth terminator: transition from -0.1 to 0.1
          float shadow = 1.0 - smoothstep(-0.1, 0.1, dotSun);
          gl_FragColor = vec4(0.0, 0.0, 0.03, shadow * 0.55);
        }
      `,
      transparent: true,
      depthWrite: false,
    });
    const nightMesh = new THREE.Mesh(nightGeo, nightMat);
    earthGroup.add(nightMesh);

    // ── Real-world constants for distance computation ───────
    const REAL_EARTH_RADIUS_KM = 6371;
    const REAL_ISS_ALT_KM = 408;
    const KM_TO_SCENE = EARTH_RADIUS / REAL_EARTH_RADIUS_KM;

    function computeAntipodalDistanceKm(elevationM) {
      const issR = REAL_EARTH_RADIUS_KM + REAL_ISS_ALT_KM;
      const antiR = REAL_EARTH_RADIUS_KM + (elevationM || 0) / 1000;
      return issR + antiR;
    }

    // ── Coordinate helpers ───────────────────────────────────
    function latLonToVec3(lat, lon, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
         radius * Math.cos(phi),
         radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    // ── ISS Marker ───────────────────────────────────────────
    const issGroup = new THREE.Group();
    scene.add(issGroup);

    // Glowing red dot
    const issMarkerGeo = new THREE.SphereGeometry(0.08, 16, 16);
    const issMarkerMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
    const issMarker = new THREE.Mesh(issMarkerGeo, issMarkerMat);
    issGroup.add(issMarker);

    // Glow sprite
    const glowCanvas = document.createElement('canvas');
    glowCanvas.width = 64; glowCanvas.height = 64;
    const gCtx = glowCanvas.getContext('2d');
    const gradient = gCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
    gradient.addColorStop(0, 'rgba(255,68,68,0.8)');
    gradient.addColorStop(0.3, 'rgba(255,68,68,0.3)');
    gradient.addColorStop(1, 'rgba(255,68,68,0)');
    gCtx.fillStyle = gradient;
    gCtx.fillRect(0, 0, 64, 64);
    const glowTexture = new THREE.CanvasTexture(glowCanvas);
    const glowSprite = new THREE.Sprite(
      new THREE.SpriteMaterial({ map: glowTexture, transparent: true, depthWrite: false })
    );
    glowSprite.scale.set(0.8, 0.8, 1);
    issGroup.add(glowSprite);

    // ISS label
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 128; labelCanvas.height = 32;
    const lCtx = labelCanvas.getContext('2d');
    lCtx.font = 'bold 20px monospace';
    lCtx.fillStyle = '#ff6666';
    lCtx.fillText('ISS', 4, 22);
    const labelTexture = new THREE.CanvasTexture(labelCanvas);
    const labelSprite = new THREE.Sprite(
      new THREE.SpriteMaterial({ map: labelTexture, transparent: true, depthWrite: false })
    );
    labelSprite.scale.set(0.8, 0.2, 1);
    labelSprite.position.set(0.5, 0.2, 0);
    issGroup.add(labelSprite);

    // ── Antipodal Marker ────────────────────────────────────
    const antiGroup = new THREE.Group();
    scene.add(antiGroup);

    // Glowing cyan dot
    const antiMarkerGeo = new THREE.SphereGeometry(0.08, 16, 16);
    const antiMarkerMat = new THREE.MeshBasicMaterial({ color: 0x00ddff });
    const antiMarker = new THREE.Mesh(antiMarkerGeo, antiMarkerMat);
    antiGroup.add(antiMarker);

    // Glow sprite (cyan)
    const antiGlowCanvas = document.createElement('canvas');
    antiGlowCanvas.width = 64; antiGlowCanvas.height = 64;
    const agCtx = antiGlowCanvas.getContext('2d');
    const antiGradient = agCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
    antiGradient.addColorStop(0, 'rgba(0,221,255,0.8)');
    antiGradient.addColorStop(0.3, 'rgba(0,221,255,0.3)');
    antiGradient.addColorStop(1, 'rgba(0,221,255,0)');
    agCtx.fillStyle = antiGradient;
    agCtx.fillRect(0, 0, 64, 64);
    const antiGlowTexture = new THREE.CanvasTexture(antiGlowCanvas);
    const antiGlowSprite = new THREE.Sprite(
      new THREE.SpriteMaterial({ map: antiGlowTexture, transparent: true, depthWrite: false })
    );
    antiGlowSprite.scale.set(0.8, 0.8, 1);
    antiGroup.add(antiGlowSprite);

    // Antipodal label
    const antiLabelCanvas = document.createElement('canvas');
    antiLabelCanvas.width = 256; antiLabelCanvas.height = 32;
    const alCtx = antiLabelCanvas.getContext('2d');
    alCtx.font = 'bold 18px monospace';
    alCtx.fillStyle = '#00ddff';
    alCtx.fillText('ANTIPODAL', 4, 22);
    const antiLabelTexture = new THREE.CanvasTexture(antiLabelCanvas);
    const antiLabelSprite = new THREE.Sprite(
      new THREE.SpriteMaterial({ map: antiLabelTexture, transparent: true, depthWrite: false })
    );
    antiLabelSprite.scale.set(1.4, 0.2, 1);
    antiLabelSprite.position.set(0.8, 0.2, 0);
    antiGroup.add(antiLabelSprite);

    // ── ISS position state ───────────────────────────────────
    let currentPos = new THREE.Vector3();
    let targetPos = new THREE.Vector3();
    let antiCurrentPos = new THREE.Vector3();
    let antiTargetPos = new THREE.Vector3();
    let hasPosition = false;
    let lastFetchTime = 0;
    let consecutiveErrors = 0;
    let lastElevationFetch = 0;
    const ELEVATION_THROTTLE = 15000;
    let antiElevationM = null;
    let antiDistanceKm = null;

    function updateISSPosition(lat, lon) {
      targetPos = latLonToVec3(lat, lon, EARTH_RADIUS + ISS_ALTITUDE);
      if (!hasPosition) {
        currentPos.copy(targetPos);
        hasPosition = true;
      }
      lastFetchTime = Date.now();

      // Compute antipodal point
      const antiLat = -lat;
      const antiLon = lon > 0 ? lon - 180 : lon + 180;
      const elevKm = (antiElevationM || 0) / 1000;
      antiTargetPos = latLonToVec3(antiLat, antiLon, EARTH_RADIUS + elevKm * KM_TO_SCENE);
      if (!antiCurrentPos.lengthSq()) {
        antiCurrentPos.copy(antiTargetPos);
      }

      // Fetch elevation at antipodal point (throttled)
      fetchElevation(antiLat, antiLon);

      // Compute distance
      antiDistanceKm = computeAntipodalDistanceKm(antiElevationM);

      // Update info panel
      document.getElementById('info-panel').style.display = 'block';
      document.getElementById('lat-val').textContent =
        `${Math.abs(lat).toFixed(4)}° ${lat >= 0 ? 'N' : 'S'}`;
      document.getElementById('lon-val').textContent =
        `${Math.abs(lon).toFixed(4)}° ${lon >= 0 ? 'E' : 'W'}`;
      document.getElementById('anti-lat-val').textContent =
        `${Math.abs(antiLat).toFixed(4)}° ${antiLat >= 0 ? 'N' : 'S'}`;
      document.getElementById('anti-lon-val').textContent =
        `${Math.abs(antiLon).toFixed(4)}° ${antiLon >= 0 ? 'E' : 'W'}`;
      document.getElementById('anti-elev-val').textContent =
        antiElevationM !== null ? `${antiElevationM.toFixed(0)} m` : '—';
      document.getElementById('anti-dist-val').textContent =
        antiDistanceKm !== null ? `${antiDistanceKm.toFixed(1)} km` : '—';
      updateOrbitTrail(lat, lon);
    }

    // ── API Polling ──────────────────────────────────────────
    async function fetchISS() {
      try {
        const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
        const data = await res.json();
        if (data.latitude !== undefined) {
          consecutiveErrors = 0;
          document.getElementById('connection-lost').style.display = 'none';
          updateISSPosition(data.latitude, data.longitude);
        }
      } catch {
        consecutiveErrors++;
        if (consecutiveErrors >= 3) {
          document.getElementById('connection-lost').style.display = 'block';
        }
      }
    }
    fetchISS();
    setInterval(fetchISS, POLL_INTERVAL);

    // ── Crew Data (fetched once) ─────────────────────────────
    async function fetchCrew() {
      try {
        const res = await fetch('https://corquaid.github.io/international-space-station-APIs/JSON/people-in-space.json');
        const data = await res.json();
        const issCrew = data.people.filter(p => p.iss === true);
        document.getElementById('crew-count').textContent = `${issCrew.length} aboard`;
        document.getElementById('crew-list').innerHTML = issCrew.map(p => p.name).join('<br>');
      } catch {
        document.getElementById('crew-count').textContent = '—';
      }
    }
    fetchCrew();

    // ── Elevation at Antipodal Point (throttled) ────────────
    async function fetchElevation(lat, lon) {
      const now = Date.now();
      if (now - lastElevationFetch < ELEVATION_THROTTLE) return;
      lastElevationFetch = now;
      try {
        const res = await fetch(
          `https://api.open-meteo.com/v1/elevation?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}`
        );
        const data = await res.json();
        if (data.elevation && data.elevation.length > 0) {
          antiElevationM = data.elevation[0];
        }
      } catch {
        // Keep previous value; graceful degradation
      }
    }

    // ── Orbit Trail ──────────────────────────────────────────
    const ORBIT_POINTS = 200;
    const orbitGeo = new THREE.BufferGeometry();
    const orbitPositions = new Float32Array(ORBIT_POINTS * 3);
    const orbitAlphas = new Float32Array(ORBIT_POINTS);
    orbitGeo.setAttribute('position', new THREE.BufferAttribute(orbitPositions, 3));
    orbitGeo.setAttribute('alpha', new THREE.BufferAttribute(orbitAlphas, 1));

    const orbitMat = new THREE.ShaderMaterial({
      vertexShader: `
        attribute float alpha;
        varying float vAlpha;
        void main() {
          vAlpha = alpha;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        void main() {
          gl_FragColor = vec4(1.0, 0.3, 0.3, vAlpha);
        }
      `,
      transparent: true,
      depthWrite: false,
    });
    const orbitLine = new THREE.Line(orbitGeo, orbitMat);
    scene.add(orbitLine);

    let prevLat = null;
    function updateOrbitTrail(lat, lon) {
      const incRad = ORBIT_INCLINATION * (Math.PI / 180);
      const lonRad = lon * (Math.PI / 180);
      const latRad = lat * (Math.PI / 180);

      // Estimate orbital phase from current latitude
      const sinPhase = Math.sin(latRad) / Math.sin(incRad);
      const phase = Math.asin(Math.max(-1, Math.min(1, sinPhase)));

      // Determine ascending vs descending from latitude change
      const ascending = prevLat !== null ? (lat - prevLat) >= 0 : true;
      prevLat = lat;
      const currentPhase = ascending ? phase : Math.PI - phase;

      // Ascending node longitude
      const ascNode = lonRad - Math.atan2(Math.sin(currentPhase) * Math.cos(incRad), Math.cos(currentPhase));

      const R = EARTH_RADIUS + ISS_ALTITUDE * 0.5;

      for (let i = 0; i < ORBIT_POINTS; i++) {
        const t = (i / ORBIT_POINTS) * Math.PI * 2;

        // Orbital position in the inclined plane
        const ox = Math.cos(t);
        const oy = Math.sin(t) * Math.sin(incRad);
        const oz = Math.sin(t) * Math.cos(incRad);

        // Rotate by ascending node
        const rx = ox * Math.cos(ascNode) - oz * Math.sin(ascNode);
        const rz = ox * Math.sin(ascNode) + oz * Math.cos(ascNode);

        // Convert to Three.js coordinates (Y-up)
        const phi = Math.acos(oy);
        const theta = Math.atan2(rz, rx);
        orbitPositions[i * 3]     = -R * Math.sin(phi) * Math.cos(theta);
        orbitPositions[i * 3 + 1] =  R * Math.cos(phi);
        orbitPositions[i * 3 + 2] =  R * Math.sin(phi) * Math.sin(theta);

        // Fade: brightest near the ISS phase, fading further away
        const dist = Math.abs(t - currentPhase) < Math.PI
          ? Math.abs(t - currentPhase)
          : Math.PI * 2 - Math.abs(t - currentPhase);
        orbitAlphas[i] = Math.max(0.05, (1.0 - dist / Math.PI) * 0.5);
      }

      orbitGeo.attributes.position.needsUpdate = true;
      orbitGeo.attributes.alpha.needsUpdate = true;
    }

    // ── Resize handler ───────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animation loop ─────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      // Animate camera jump (spherical arc via quaternion slerp)
      if (jumpAnim) {
        const t = Math.min((performance.now() - jumpAnim.startTime) / jumpAnim.duration, 1);
        const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; // easeInOutCubic
        _jumpQ.slerpQuaternions(jumpAnim.startQ, jumpAnim.endQ, ease);
        camera.position.copy(jumpAnim.startDir).applyQuaternion(_jumpQ).multiplyScalar(jumpAnim.dist);
        if (t >= 1) jumpAnim = null;
      }

      controls.update();

      // Lerp ISS position
      if (hasPosition) {
        currentPos.lerp(targetPos, 0.08);
        issGroup.position.copy(currentPos);
        issGroup.lookAt(currentPos.clone().normalize().multiplyScalar(100));

        // Lerp antipodal position
        antiCurrentPos.lerp(antiTargetPos, 0.08);
        antiGroup.position.copy(antiCurrentPos);
        antiGroup.lookAt(antiCurrentPos.clone().normalize().multiplyScalar(100));
      }

      // Update "updated X seconds ago" (only when value changes)
      if (lastFetchTime) {
        const ago = Math.floor((Date.now() - lastFetchTime) / 1000);
        const el = document.getElementById('updated-time');
        const text = `Updated: ${ago}s ago`;
        if (el.textContent !== text) el.textContent = text;
      }

      // Update sun position every frame and sync directional light
      const sunDir = getSunDirection();
      nightMat.uniforms.sunDir.value.copy(sunDir);
      sunLight.position.copy(sunDir).multiplyScalar(50);

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
